<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Promoções da Loja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container"> 
            <a class="navbar-brand" href="#">
                Lojinha de Óculos <i class="bi bi-eyeglasses"></i>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Sobre</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contatos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="alert alert-info alert-dismissible fade show" role="alert">
            <strong>Promoção Relâmpago!</strong> 20% de desconto hoje.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div id="carouselExemplo" class="carousel slide mt-3" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://images.pexels.com/photos/3042732/pexels-photo-3042732.jpeg" class="d-block w-100" alt="Óculos de Sol">
                </div>
                <div class="carousel-item">
                    <img src="https://images.pexels.com/photos/4037163/pexels-photo-4037163.jpeg" class="d-block w-100" alt="Modelos Novos">
                </div>
                <div class="carousel-item">
                    <img src="https://images.pexels.com/photos/701877/pexels-photo-701877.jpeg" class="d-block w-100" alt="Promoção de Verão">
                </div>
            </div>
            
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExemplo" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExemplo" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>

        <div class="p-4 bg-light text-center mt-5 border rounded">
            <h5>Ganhe seu Desconto Incrível</h5>
            <div class="progress mb-3">
                <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" 
                     role="progressbar" style="width: 0%;">0%</div>
            </div>
            <button id="increase-progress" class="btn btn-primary">Melhorar Progresso</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.getElementById('increase-progress').addEventListener('click', function() {
            let progressBar = document.getElementById('progress-bar');
            let width = parseInt(progressBar.style.width); 
            
            if (width < 100) {
                width += 20;
                progressBar.style.width = width + "%";
                progressBar.textContent = width + "%";

                if (width === 100) {
                    setTimeout(() => {
                        alert("Parabéns! Você desbloqueou um desconto especial!");
                    }); 
                }
            }
        });
    </script>

</body>
</html>
